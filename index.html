<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cinema Atlas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<style>
:root{
  --serif:'Fraunces',Georgia,'Times New Roman',serif;
  --sans:'IBM Plex Sans',system-ui,-apple-system,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
  /* light (paper) */
  --paper:#f3efe6; --paper2:#eae4d7; --card:#f7f4ec;
  --ink:#1c1a16; --ink2:#6a6456; --line:#d8d1c0; --line2:#c5bca7;
  --accent:#c1352b; --accent-ink:#fff;
  --c-film143:#c1352b; --c-laser143:#b07d12; --c-dome:#2c7a57;
  --c-gtxt190:#2f5d8a; --c-cola190:#6b5b95; --c-xenon190:#8a8275;
  --c-other190:#9a917f; --c-other:#b3aa96;
  --c-dolby_cinema:#3b4cc0; --c-screenx:#0e7c86; --c-fourdx:#c0398b;
  --c-atmos:#9a7d2e; --c-isense:#a8632a; --c-cinema:#9aa0a6; --c-dbox:#1f7a6b;
  --c-classic70:#c85a1e;
  --shadow:none;
}
html[data-theme="dark"]{
  --paper:#14110d; --paper2:#1c1813; --card:#1a1610;
  --ink:#ece6d8; --ink2:#9c9382; --line:#322c24; --line2:#433c31;
  --accent:#e2574c; --accent-ink:#1a120f;
  --c-film143:#e2574c; --c-laser143:#d7a23f; --c-dome:#46a87f;
  --c-gtxt190:#5d92c9; --c-cola190:#9d8ec9; --c-xenon190:#a39a89;
  --c-other190:#8d8475; --c-other:#7d7567;
  --c-dolby_cinema:#6f7fe0; --c-screenx:#3fb0bb; --c-fourdx:#e06bb4;
  --c-atmos:#c4ab66; --c-isense:#cf9152; --c-cinema:#7f8690; --c-dbox:#3fb0a0;
  --c-classic70:#e88a4a;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);
  font-size:14px;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
a{color:var(--accent)}
.mono{font-family:var(--mono)}
.tnum{font-variant-numeric:tabular-nums}

/* Masthead */
header{border-bottom:1px solid var(--line2);padding:14px 22px 12px;display:flex;align-items:baseline;gap:18px;flex:none}
.brand{font-family:var(--serif);font-weight:600;font-size:25px;letter-spacing:-.01em;line-height:1}
.brand .x{color:var(--accent)}
.tag{font-size:12px;color:var(--ink2);max-width:520px;line-height:1.45}
.tag b{color:var(--ink);font-weight:600}
.spacer{flex:1}
.themebtn{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;
  background:none;border:1px solid var(--line2);color:var(--ink);border-radius:2px;padding:6px 11px;cursor:pointer}
.themebtn:hover{border-color:var(--accent);color:var(--accent)}

/* Controls */
.controls{border-bottom:1px solid var(--line);padding:10px 22px;display:flex;flex-wrap:wrap;
  gap:14px 20px;align-items:center;flex:none}
.ctl{display:flex;align-items:center;gap:8px}
.lbl{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2)}
input[type=search],select{font-family:var(--sans);font-size:13px;background:var(--card);color:var(--ink);
  border:1px solid var(--line2);border-radius:2px;padding:7px 10px;outline:none}
input[type=search]{min-width:230px}
input:focus,select:focus{border-color:var(--accent)}
.facets{display:flex;flex-wrap:wrap;gap:4px 16px;align-items:center}
.facet{font-family:var(--sans);font-weight:600;font-size:11px;letter-spacing:.07em;text-transform:uppercase;
  color:var(--ink);background:none;border:0;border-bottom:2px solid transparent;padding:3px 0;cursor:pointer;
  display:inline-flex;gap:6px;align-items:center}
.facet .sw{width:9px;height:9px;border-radius:1px;flex:none}
.facet .ct{font-family:var(--mono);font-weight:400;color:var(--ink2);letter-spacing:0;font-size:11px}
.facet.off{opacity:.35}
.facet.on{border-bottom-color:var(--ink)}
.facet:hover{color:var(--accent)}
.fgroup{font-family:var(--mono);font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;
  color:var(--ink2);opacity:.75;padding:0 4px 0 8px;border-left:1px solid var(--line2)}
.fgroup:first-child{border-left:0;padding-left:0}
.modebar{display:flex;align-items:center;gap:16px;padding:9px 22px;border-bottom:1px solid var(--line);flex:none}
.modesw{display:inline-flex;border:1px solid var(--line2);border-radius:3px;overflow:hidden;flex:none}
.modesw button{font-family:var(--serif);font-size:14.5px;background:none;border:0;color:var(--ink2);
  padding:6px 16px;cursor:pointer;border-right:1px solid var(--line2);white-space:nowrap}
.modesw button:last-child{border-right:0}
.modesw button.active{background:var(--accent);color:var(--accent-ink);font-weight:600}
.modesw button:not(.active):hover{color:var(--ink)}
.modehint{font-size:12px;color:var(--ink2)}
.dt-web{display:inline-block;margin-top:10px;font-size:13px;font-weight:600}
.evbox{font-size:13.5px;line-height:1.5} .evbox .evlink{display:block;margin:5px 0;font-weight:500}
.hallstbl{width:100%;border-collapse:collapse;margin:10px 0;font-size:12.5px}
.hallstbl th{text-align:left;font-family:var(--mono);font-weight:400;font-size:10px;letter-spacing:.06em;
  text-transform:uppercase;color:var(--ink2);padding:5px 6px;border-bottom:1px solid var(--line2)}
.hallstbl td{padding:5px 6px;border-bottom:1px solid var(--line);font-family:var(--mono)}
.hallstbl tr.imaxrow td{color:var(--accent)}
.hallstbl tfoot td{font-weight:600;border-bottom:0;padding-top:8px}
.rcegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin:10px 0}
.rcethumb{position:relative;border:1px solid var(--line);border-radius:2px;overflow:hidden;aspect-ratio:4/3;background:#000;cursor:zoom-in}
.rcethumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s}
.rcethumb:hover img{transform:scale(1.05)}
.rcethumb .cap{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(transparent,rgba(0,0,0,.72));
  color:#fff;font-size:10px;padding:10px 6px 4px;line-height:1.2}
@media(max-width:880px){.modehint{display:none}}
.txtbtn{background:none;border:0;color:var(--ink2);font-size:11px;cursor:pointer;text-decoration:underline;font-family:var(--mono)}
.check{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink2);cursor:pointer;user-select:none}
.check input{accent-color:var(--accent)}
.viewtg{display:none}

/* Layout */
main{flex:1;display:flex;min-height:0;position:relative}
#listpane{width:34%;max-width:520px;min-width:280px;flex:none;display:flex;flex-direction:column;border-right:1px solid var(--line2)}
#resizer{width:7px;flex:none;cursor:col-resize;position:relative;background:transparent;touch-action:none}
#resizer::after{content:"";position:absolute;top:0;bottom:0;left:3px;width:1px;background:var(--line2)}
#resizer:hover::after,#resizer.dragging::after{left:2px;width:3px;background:var(--accent)}
.listhead{padding:9px 22px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11px;
  letter-spacing:.04em;color:var(--ink2);display:flex;justify-content:space-between;align-items:center;flex:none}
.listhead select{font-size:11px;padding:3px 6px}
/* Scrollbar in Seitenfarben statt Standard-Balken */
*{scrollbar-width:thin;scrollbar-color:var(--line2) transparent}
*::-webkit-scrollbar{width:10px;height:10px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px;border:2px solid var(--paper);background-clip:padding-box}
*::-webkit-scrollbar-thumb:hover{background:var(--accent);border-color:var(--paper);background-clip:padding-box}
#rows{overflow:auto;flex:1}
.row{padding:13px 22px;border-bottom:1px solid var(--line);cursor:pointer}
.row:hover,.row.hot{background:var(--paper2)}
.row .name{font-family:var(--serif);font-weight:500;font-size:16.5px;line-height:1.18;letter-spacing:-.005em}
.row .extra{color:var(--accent);font-family:var(--mono);font-size:10px;vertical-align:super}
.row .loc{font-size:12.5px;color:var(--ink2);margin-top:2px}
.row .meta{margin-top:6px;display:flex;flex-wrap:wrap;gap:9px;align-items:center;
  font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink2)}
.row .meta .sw{width:8px;height:8px;border-radius:1px;display:inline-block;margin-right:5px;vertical-align:middle}
.row .seventy{color:var(--accent);font-weight:600}
.row .ndist{color:var(--accent);font-weight:600;font-family:var(--mono);letter-spacing:0;text-transform:none}
.nearnote{padding:12px 22px;font-size:12.5px;line-height:1.45;color:var(--ink2);
  background:color-mix(in srgb,var(--accent) 9%,transparent);border-bottom:1px solid var(--line2)}
.nearnote b{color:var(--ink)}
.nearnote .txtbtn{margin-left:8px}
.citehead{position:sticky;top:0;z-index:2;padding:11px 22px 7px;display:flex;align-items:baseline;
  gap:10px;flex-wrap:wrap;background:var(--paper2);border-top:1px solid var(--line2);border-bottom:1px solid var(--line)}
.citehead .cname{font-family:var(--serif);font-weight:600;font-size:16.5px;color:var(--ink);letter-spacing:-.005em}
.citehead .cmeta{font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;color:var(--ink2);text-transform:uppercase}
mark{background:color-mix(in srgb,var(--accent) 22%,transparent);color:inherit;padding:0 1px}
.rowdetail{background:var(--paper2);border-bottom:2px solid var(--line2)}
.rowdetail .dt-in{padding:22px 22px 30px}
.rowdetail .dt-name{font-size:22px}

#map{flex:1;min-width:0}
.leaflet-container{background:var(--paper2);font-family:var(--sans)}
.leaflet-popup-content-wrapper,.leaflet-popup-tip{background:var(--card);color:var(--ink);border-radius:2px;box-shadow:0 2px 14px rgba(0,0,0,.25)}
.leaflet-popup-content{margin:11px 13px;font-size:12px}
.pp .nm{font-family:var(--serif);font-size:14px;font-weight:500}
.pp .mt{color:var(--ink2);margin-top:3px}
.marker-cluster div{font-family:var(--mono);font-weight:500}

/* Detail slide-over */
#sidepanel{position:absolute;top:0;right:0;bottom:0;width:480px;max-width:92%;background:var(--card);
  border-left:1px solid var(--line2);transform:translateX(101%);transition:transform .26s cubic-bezier(.4,0,.2,1);
  overflow:auto;z-index:1200;box-shadow:-8px 0 30px rgba(0,0,0,.16)}
#sidepanel.open{transform:none}
.dt-x{position:absolute;top:14px;right:16px;background:none;border:0;font-size:22px;line-height:1;color:var(--ink2);cursor:pointer}
.dt-x:hover{color:var(--accent)}
.dt-in{padding:26px 26px 50px}
.dt-kicker{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
.dt-name{font-family:var(--serif);font-weight:600;font-size:27px;line-height:1.1;margin:8px 0 4px;letter-spacing:-.01em}
.dt-loc{color:var(--ink2);font-size:13px}
.dt-svg{margin:22px 0 8px;border:1px solid var(--line);background:var(--paper);border-radius:2px;padding:14px}
.dt-cap{font-family:var(--mono);font-size:10.5px;color:var(--ink2);letter-spacing:.04em;text-align:center;margin-top:6px}
.specs{width:100%;border-collapse:collapse;margin:18px 0 4px;font-size:13px}
.specs th{text-align:left;font-family:var(--mono);font-weight:400;font-size:10.5px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--ink2);padding:7px 0;width:42%;vertical-align:top;border-bottom:1px solid var(--line)}
.specs td{padding:7px 0;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:12.5px}
.sectit{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ink2);margin:26px 0 12px;border-bottom:1px solid var(--line2);padding-bottom:6px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:9px}
.thumb{position:relative;border:1px solid var(--line);border-radius:2px;overflow:hidden;aspect-ratio:4/3;background:#000}
.thumb img{width:100%;height:100%;object-fit:cover;cursor:zoom-in;display:block}
.thumb .del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.62);color:#fff;border:0;width:22px;height:22px;border-radius:50%;cursor:pointer}
.addbtn{display:inline-block;margin-top:12px;font-family:var(--sans);font-weight:600;font-size:12.5px;
  background:var(--accent);color:var(--accent-ink);border-radius:2px;padding:8px 14px;cursor:pointer}
.hint{color:var(--ink2);font-size:11px;line-height:1.5;margin-top:9px}
.empty{color:var(--ink2);font-size:12px;padding:6px 0}
.specs .muted{color:var(--ink2);font-weight:400}
.editlink{background:none;border:0;color:var(--accent);font-size:11px;cursor:pointer;text-decoration:underline;margin-left:8px;font-family:var(--mono)}
.editform label{display:block;font-size:10px;color:var(--ink2);margin-top:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em}
.editform input,.editform select{width:100%;margin-top:4px;background:var(--paper);color:var(--ink);border:1px solid var(--line2);border-radius:2px;padding:7px 9px;font-size:13px;font-family:var(--sans)}
.editform input:focus,.editform select:focus{border-color:var(--accent);outline:none}
.editform .erow{display:flex;gap:10px}.editform .erow>label,.editform .erow>button{flex:1}
.ghost{background:none;border:1px solid var(--line2);color:var(--ink);border-radius:2px;padding:9px 12px;font-size:13px;cursor:pointer;margin-top:10px}
.ghost:hover{border-color:var(--accent)}
.ghost.danger{color:var(--accent);border-color:var(--accent)}
.edited{color:var(--accent);font-size:11px;margin-left:5px}

footer{display:none}

/* Mobile scaffold: hidden on desktop, activated by the media query below.
   The actual controls (search, mode switch, filters, list) are relocated
   into these shells by JS, so all existing behaviour keeps working. */
#mchrome,#msheet,#mfilter{display:none}

@media(max-width:820px){
  /* ===== Mobile-first: full-screen map + draggable list sheet ===== */
  body{overflow:hidden}
  /* desktop chrome is emptied by JS, then hidden here */
  header,.modebar,.controls,footer{display:none!important}
  main{position:static;display:block}
  #listpane{width:auto;max-width:none;min-width:0;border:0;height:100%}
  #resizer{display:none}

  /* map fills the whole screen behind the floating UI */
  #map{position:fixed;inset:0;width:auto;height:auto;min-width:0;z-index:0}
  .leaflet-control-zoom{display:none}
  .leaflet-control-attribution{font-size:9px;opacity:.7}

  /* --- floating top bar: search + filter, then the mode switch --- */
  #mchrome{display:block;position:fixed;top:0;left:0;right:0;z-index:1000;
    padding:calc(env(safe-area-inset-top,0px) + 9px) 10px 8px;pointer-events:none}
  #mtop{display:flex;gap:8px}
  #msearch{flex:1;display:flex;align-items:center;gap:4px;background:var(--card);
    border:1px solid var(--line2);border-radius:999px;padding:0 8px 0 14px;pointer-events:auto;
    box-shadow:0 2px 12px rgba(0,0,0,.14)}
  #msearch::before{content:"⌕";font-size:18px;color:var(--ink2);line-height:1}
  #msearch input[type=search]{flex:1;min-width:0;width:auto;border:0!important;background:none;
    padding:12px 4px;font-size:16px}
  #mfilterbtn{flex:none;pointer-events:auto;display:inline-flex;align-items:center;gap:7px;
    background:var(--card);border:1px solid var(--line2);border-radius:999px;padding:0 16px;
    font-family:var(--sans);font-weight:600;font-size:13.5px;color:var(--ink);cursor:pointer;
    box-shadow:0 2px 12px rgba(0,0,0,.14)}
  #mfilterbtn .fdot{width:7px;height:7px;border-radius:50%;background:var(--accent);display:none}
  #mfilterbtn.on{border-color:var(--accent);color:var(--accent)}
  #mfilterbtn.on .fdot{display:inline-block}
  #mmode{display:flex;justify-content:center;margin-top:9px;pointer-events:none}
  #mmode .modesw{pointer-events:auto;background:var(--card);box-shadow:0 2px 12px rgba(0,0,0,.14)}
  #mmode .modesw button{padding:8px 20px;font-size:14.5px}

  /* --- bottom list sheet (draggable) --- */
  #msheet{display:flex;flex-direction:column;position:fixed;left:0;right:0;bottom:0;z-index:900;
    height:var(--sheet-h,46dvh);max-height:92dvh;background:var(--card);
    border-top:1px solid var(--line2);border-radius:18px 18px 0 0;
    box-shadow:0 -6px 28px rgba(0,0,0,.22);transition:height .3s cubic-bezier(.4,0,.2,1)}
  #msheet.dragging{transition:none}
  #mhandle{flex:none;padding:9px 16px 4px;display:flex;flex-direction:column;align-items:center;
    gap:2px;cursor:grab;touch-action:none;user-select:none}
  #mhandle .grip{width:40px;height:5px;border-radius:3px;background:var(--line2)}
  #msheetbody{flex:1;min-height:0;display:flex}
  #msheetbody #listpane{flex:1;display:flex;flex-direction:column;min-height:0}
  #msheetbody .listhead{padding:7px 18px 9px;font-size:11px}
  #msheetbody #rows{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}
  .row{padding:14px 18px}
  .row .name{font-size:16.5px}
  .citehead{padding:10px 18px 6px}
  .nearnote{padding:12px 18px}

  /* --- filter sheet (full-screen modal) --- */
  #mfilter{display:flex;flex-direction:column;position:fixed;inset:0;z-index:1500;background:var(--paper);
    transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
    padding-top:env(safe-area-inset-top,0px)}
  #mfilter.open{transform:none}
  #mfilterhead{flex:none;display:flex;align-items:center;justify-content:space-between;
    padding:15px 18px;border-bottom:1px solid var(--line)}
  #mfilterhead .brand{font-family:var(--serif);font-weight:600;font-size:21px}
  #mfilterdone{background:var(--accent);color:var(--accent-ink);border:0;border-radius:999px;
    padding:10px 22px;font-family:var(--sans);font-weight:600;font-size:14.5px;cursor:pointer}
  #mfilterbody{flex:1;overflow:auto;padding:16px 18px calc(env(safe-area-inset-bottom,0px) + 30px)}
  #mfilterbody .msec{margin-top:22px}
  #mfilterbody .msec:first-child{margin-top:6px}
  #mfilterbody .mlabel{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;
    color:var(--ink2);margin:0 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
  #mfilterbody .ctl{display:block}
  #mfilterbody .ctl .lbl{display:block;margin-bottom:5px}
  #mfilterbody select{width:100%;padding:12px;font-size:15px;margin-bottom:12px}
  #mfilterbody #facets{display:flex;flex-wrap:wrap;gap:9px}
  #mfilterbody .facet{border:1px solid var(--line2);border-radius:999px;padding:9px 15px;font-size:12px}
  #mfilterbody .facet.on{border-bottom-width:1px;border-color:var(--ink);background:var(--paper2)}
  #mfilterbody .facet.off{opacity:.4}
  #mtxtrow{display:flex;gap:16px;align-items:center;margin-top:12px}
  #mfilterbody .check{font-size:15px;padding:11px 0;display:flex}
  #mactions{display:flex;flex-wrap:wrap;gap:9px;margin-top:4px}
  #mactions .themebtn{padding:11px 15px;font-size:12.5px}

  /* --- detail becomes a full-screen sheet sliding up from the bottom --- */
  #sidepanel{position:fixed;inset:0;width:auto;max-width:none;border:0;border-radius:0;
    box-shadow:none;transform:translateY(100%);padding-top:env(safe-area-inset-top,0px);z-index:1600}
  #sidepanel.open{transform:none}
  .dt-x{top:calc(env(safe-area-inset-top,0px) + 12px);font-size:26px}
  .dt-in{padding:26px 20px calc(env(safe-area-inset-bottom,0px) + 60px)}
  .dt-name{font-size:24px}
}
</style>
</head>
<body>
<header>
  <div class="brand">Cinema<span class="x">·</span>Atlas</div>
  <div class="tag">Kinosäle nach Premium-Format — IMAX weltweit (mit Leinwandmaßen), dazu <b>Dolby&nbsp;Cinema</b>, <b>ScreenX</b>, <b>4DX</b>, <b>iSense</b> &amp; <b>Dolby&nbsp;Atmos</b> (Start: Deutschland).</div>
  <div class="spacer"></div>
  <button class="themebtn viewtg" id="viewBtn">Karte</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script src="config.js"></script>
<script>
const FORMATS={
  film143:{label:"IMAX 70 mm Film",short:"70 mm · 1.43",ar:"1.43:1",group:"imax"},
  laser143:{label:"IMAX 1.43:1 Laser",short:"1.43 · Laser",ar:"1.43:1",group:"imax"},
  dome:{label:"IMAX Dome",short:"Dome",ar:"Dome",group:"imax"},
  gtxt190:{label:"IMAX 1.90:1 GT/XT",short:"1.90 · GT/XT",ar:"1.90:1",group:"imax"},
  cola190:{label:"IMAX 1.90:1 CoLa",short:"1.90 · CoLa",ar:"1.90:1",group:"imax"},
  xenon190:{label:"IMAX 1.90:1 Xenon",short:"1.90 · Xenon",ar:"1.90:1",group:"imax"},
  other190:{label:"IMAX 1.90:1 ?",short:"1.90 · ?",ar:"1.90:1",group:"imax"},
  other:{label:"IMAX Sonstige",short:"Sonstige",ar:"—",group:"imax"},
  classic70:{label:"70 mm (klassisch, 5-Perf)",short:"70 mm · 2.20",ar:"2.20:1",group:"weitere"},
  dolby_cinema:{label:"Dolby Cinema",short:"Dolby Cinema",ar:"—",group:"weitere"},
  screenx:{label:"ScreenX 270°",short:"ScreenX",ar:"—",group:"weitere"},
  fourdx:{label:"4DX",short:"4DX",ar:"—",group:"weitere"},
  isense:{label:"iSense (UCI)",short:"iSense",ar:"—",group:"weitere"},
  atmos:{label:"Dolby Atmos",short:"Atmos",ar:"—",group:"weitere"},
  dbox:{label:"D-BOX Motion",short:"D-BOX",ar:"—",group:"weitere"},
  cinema:{label:"Kino (allgemein)",short:"Kino",ar:"—",group:"cinema"},
};
const IMAXCATS=new Set(['film143','laser143','dome','gtxt190','cola190','xenon190','other190','other']);
const FDESC={
  classic70:"70 mm (klassisch) — analoge 5-Perf-Filmprojektion (Todd-AO-Linie, ~2,20:1) auf großer, teils gekrümmter Leinwand. NICHT IMAX: IMAX-70-mm läuft mit 15 Perforationen quer und ist fast quadratisch (1,43:1). Klassisches 70 mm ist 5-Perf, vertikal, breit-panoramisch.",
  dolby_cinema:"Dolby Cinema — Dolby-Vision-Laserprojektion (sehr hoher Kontrast, HDR) plus Dolby Atmos in einem eigens gestalteten Saal.",
  screenx:"ScreenX (CJ 4DPLEX) — 270°-Panorama: das Bild wird auf die linke und rechte Seitenwand erweitert.",
  fourdx:"4DX (CJ 4DPLEX) — Bewegungssitze plus Effekte: Wind, Wasser, Nebel, Duft synchron zum Film.",
  isense:"iSense — UCI-Premiumsaal mit großer Leinwand und Dolby Atmos.",
  atmos:"Dolby Atmos — objektbasierter 3D-Ton mit zusätzlichen Deckenlautsprechern.",
  dbox:"D-BOX Motion-Seats — einzelne Sitze bewegen sich synchron zum Film (Bewegung wie bei 4DX, jedoch ohne Wind/Wasser/Duft).",
  cinema:"Reguläres Kino — Standort & Website aus OpenStreetMap. Ein evtl. vorhandenes Premium-Format ist hier nicht separat erfasst.",
};
const IMAXCATSARR=[...IMAXCATS];
// Eine Hierarchie: grobe Stufe (Umschalter) -> passende Chips. Keine Wiederholung.
const SCOPES={
  imax:{chips:[
    {key:'70',  label:'70 mm Film', cats:['film143'], color:'--c-film143'},
    {key:'l143',label:'1.43:1 Laser',cats:['laser143'],color:'--c-laser143'},
    {key:'190', label:'1.90:1',     cats:['gtxt190','cola190','xenon190','other190','other'],color:'--c-gtxt190'},
    {key:'dome',label:'Dome',       cats:['dome'],    color:'--c-dome'},
  ], detail:[ // ersetzt '190', wenn „aufschlüsseln" an ist
    {key:'gtxt190', label:'1.90 GT/XT',cats:['gtxt190'], color:'--c-gtxt190'},
    {key:'cola190', label:'1.90 CoLa', cats:['cola190'], color:'--c-cola190'},
    {key:'xenon190',label:'1.90 Xenon',cats:['xenon190','other190','other'],color:'--c-xenon190'},
  ]},
  premium:{chips:[
    {key:'imax',        label:'IMAX',        cats:IMAXCATSARR,    color:'--c-film143'},
    {key:'classic70',   label:'70 mm (klassisch)',cats:['classic70'],color:'--c-classic70'},
    {key:'dolby_cinema',label:'Dolby Cinema',cats:['dolby_cinema'],color:'--c-dolby_cinema'},
    {key:'screenx',     label:'ScreenX',     cats:['screenx'],   color:'--c-screenx'},
    {key:'fourdx',      label:'4DX',         cats:['fourdx'],    color:'--c-fourdx'},
    {key:'isense',      label:'iSense',      cats:['isense'],    color:'--c-isense'},
    {key:'atmos',       label:'Dolby Atmos', cats:['atmos'],     color:'--c-atmos'},
    {key:'dbox',        label:'D-BOX',       cats:['dbox'],      color:'--c-dbox'},
  ]},
  cinema:{chips:[
    {key:'imax',   label:'IMAX',            cats:IMAXCATSARR, color:'--c-film143'},
    {key:'premium',label:'Premium-Formate', cats:['dolby_cinema','screenx','fourdx','isense','atmos','dbox','classic70'],color:'--c-dolby_cinema'},
    {key:'cinema', label:'sonstige Kinos',  cats:['cinema'],  color:'--c-cinema'},
  ]},
};
const cv=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim()||'#888';
const catColor=cat=>cv('--c-'+cat);
const norm=s=>(s||"").toString().normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase();
const slug=s=>norm(s).replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const cid=d=>slug(d.n+'-'+d.ci);
const area=d=>d.cat==='dome'?(d.w?Math.PI*(d.w/2)*(d.w/2):0):((d.w||0)*(d.h||0));
function dimText(d){
  if(d.cat==='dome') return d.w?{main:'Ø '+d.w+' m',sub:'Kuppel'}:{main:'—',sub:''};
  if(d.w&&d.h) return {main:d.w+' × '+d.h,sub:'Meter (B×H)'};
  if(d.w) return {main:d.w+' m',sub:''};
  return {main:'—',sub:'k. A.'};
}

const active=new Set();   // aktive Chip-Keys der aktuellen Stufe
let photoCounts={},db=null,coupled=true,scope='premium',detailOn=false,curChips=[];

/* ---- Korrekturen: geteilt (von Admin bestätigt, aus corrections.json) + lokal (eigener Browser) ---- */
const PATCH_FIELDS=['n','ci','co','st','url','note','lat','lng'];
let OVERRIDES={},editingId=null,pickMode=false,SHARED={};
try{OVERRIDES=JSON.parse(localStorage.getItem('cinemaOverrides')||'{}');}catch(e){}
function persistOverrides(){localStorage.setItem('cinemaOverrides',JSON.stringify(OVERRIDES));}
function applyPatchTo(d,o,flag){ if(!o||o._delete)return; PATCH_FIELDS.forEach(k=>{if(k in o)d[k]=o[k];}); d[flag]=true; d.exact=true; }
async function loadSharedCorrections(){
  try{
    const res=await fetch('corrections.json',{cache:'no-store'});
    if(res.ok) SHARED=await res.json();
  }catch(e){ /* z.B. lokal per file:// geöffnet, oder Datei existiert noch nicht */ }
  // Reihenfolge: erst geteilte (admin-bestätigte) Korrekturen, dann eigene lokale oben drauf
  DATA.forEach(d=>applyPatchTo(d,SHARED[d.id],'_approved'));
  DATA.forEach(d=>applyPatchTo(d,OVERRIDES[d.id],'_edited'));
}
const isDeleted=d=>!!((OVERRIDES[d.id]&&OVERRIDES[d.id]._delete)||(SHARED[d.id]&&SHARED[d.id]._delete));

/* ---- IndexedDB ---- */
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open('imaxPhotos',1);
  r.onupgradeneeded=e=>{e.target.result.createObjectStore('photos',{keyPath:'id',autoIncrement:true}).createIndex('cinema','cinema',{unique:false});};
  r.onsuccess=e=>{db=e.target.result;res();};r.onerror=()=>rej();});}
const ps=m=>db.transaction('photos',m).objectStore('photos');
const addPhoto=(c,b)=>new Promise((s,j)=>{const r=ps('readwrite').add({cinema:c,blob:b,ts:Date.now()});r.onsuccess=s;r.onerror=j;});
const delPhoto=i=>new Promise((s,j)=>{const r=ps('readwrite').delete(i);r.onsuccess=s;r.onerror=j;});
const getPhotos=c=>new Promise((s,j)=>{const o=[];const r=ps('readonly').index('cinema').openCursor(IDBKeyRange.only(c));r.onsuccess=e=>{const k=e.target.result;if(k){o.push({id:k.value.id,blob:k.value.blob});k.continue();}else s(o);};r.onerror=j;});
const countAll=()=>new Promise((s,j)=>{const m={};const r=ps('readonly').openCursor();r.onsuccess=e=>{const k=e.target.result;if(k){m[k.value.cinema]=(m[k.value.cinema]||0)+1;k.continue();}else s(m);};r.onerror=j;});

/* ---- Facets ---- */
const facetsEl=document.getElementById('facets');
const chipCount=c=>DATA.reduce((s,d)=>s+(d.cats.some(x=>c.cats.includes(x))?1:0),0);
function chipDefs(){
  let chips=SCOPES[scope].chips.slice();
  if(scope==='imax'&&detailOn){
    const i=chips.findIndex(c=>c.key==='190');
    if(i>=0) chips.splice(i,1,...SCOPES.imax.detail);
  }
  return chips;
}
function renderChips(){
  curChips=chipDefs();
  active.clear(); curChips.forEach(c=>active.add(c.key));   // neue Stufe: alles an
  facetsEl.innerHTML='';
  curChips.forEach(c=>{
    const b=document.createElement('button');b.className='facet on';b.dataset.k=c.key;
    b.innerHTML=`<span class="sw" style="background:${cv(c.color)}"></span>${c.label}<span class="ct">${chipCount(c)}</span>`;
    b.onclick=()=>{b.classList.toggle('off');b.classList.toggle('on');active.has(c.key)?active.delete(c.key):active.add(c.key);render();};
    facetsEl.appendChild(b);
  });
}
document.getElementById('allOn').onclick=()=>{curChips.forEach(c=>active.add(c.key));facetsEl.querySelectorAll('.facet').forEach(b=>{b.classList.add('on');b.classList.remove('off');});render();};
document.getElementById('allOff').onclick=()=>{active.clear();facetsEl.querySelectorAll('.facet').forEach(b=>{b.classList.remove('on');b.classList.add('off');});render();};

// Umschalter: IMAX -> Premium -> Alle Kinos (einzige Stelle für die grobe Ebene)
const SCOPEHINT={
  imax:'Nur IMAX — weltweit, mit Leinwandmaßen.',
  premium:'IMAX + Premium-Formate (Dolby Cinema, ScreenX, 4DX, iSense, Atmos) — derzeit Deutschland.',
  cinema:'Zusätzlich alle übrigen Kinos aus OpenStreetMap (derzeit Deutschland), mit Website-Link.'};
function setScope(s){
  scope=s;
  document.querySelectorAll('.modesw button').forEach(b=>b.classList.toggle('active',b.dataset.mode===s));
  const mh=document.getElementById('modehint'); if(mh)mh.textContent=SCOPEHINT[s]||'';
  document.getElementById('detailWrap').style.display=s==='imax'?'':'none';
  renderChips();
  render();
}
document.querySelectorAll('.modesw button').forEach(b=>b.onclick=()=>setScope(b.dataset.mode));
document.getElementById('detailToggle').addEventListener('change',e=>{detailOn=e.target.checked;renderChips();render();});

/* ---- Controls ---- */
const qEl=document.getElementById('q'),f70=document.getElementById('film70'),
  fcom=document.getElementById('commercial'),sortEl=document.getElementById('sort'),
  cpl=document.getElementById('coupled'),regionEl=document.getElementById('region'),
  countryEl=document.getElementById('country');
// Tippen in der Suche verlässt den Umkreis-Modus und filtert wieder normal
qEl.addEventListener('input',()=>{ if(nearAnchor||nearError){nearAnchor=null;nearError='';clearNearMarker();} render(); });
[f70,fcom,sortEl].forEach(e=>e.addEventListener('input',render));
// Enter / „Suchen“: den eingegebenen Ort geokodieren, dorthin fliegen und
// die Kinos der Umgebung (nach Stadt gruppiert) zeigen — immer, nicht nur bei 0 Treffern
qEl.addEventListener('keydown',e=>{
  if(e.key!=='Enter') return;
  e.preventDefault();
  if(qEl.value.trim()) searchNearest(qEl.value);
});
cpl.addEventListener('change',()=>{coupled=cpl.checked;render();});

// Region- und Länder-Dropdowns füllen
[...new Set(DATA.map(d=>d.reg))].sort((a,b)=>a.localeCompare(b,'de'))
  .forEach(r=>regionEl.add(new Option(r,r)));
function fillCountries(){
  const reg=regionEl.value, cur=countryEl.value;
  const cnt={};DATA.filter(d=>!reg||d.reg===reg).forEach(d=>cnt[d.co]=(cnt[d.co]||0)+1);
  countryEl.innerHTML='<option value="">alle Länder</option>';
  Object.keys(cnt).sort((a,b)=>a.localeCompare(b,'de'))
    .forEach(c=>countryEl.add(new Option(`${c} (${cnt[c]})`,c)));
  countryEl.value=[...countryEl.options].some(o=>o.value===cur)?cur:'';
}
fillCountries();
regionEl.addEventListener('change',()=>{fillCountries();render();zoomToFilter();});
countryEl.addEventListener('change',()=>{render();zoomToFilter();});
function zoomToFilter(){
  if(!map||!lastBase.length)return;
  if(!regionEl.value&&!countryEl.value){map.flyTo([25,5],2,{duration:.6});return;}
  const b=L.latLngBounds(lastBase.map(d=>[d.lat,d.lng]));
  if(b.isValid())map.flyToBounds(b,{padding:[40,40],maxZoom:11,duration:.6});
}

/* ---- Umkreissuche: wenn die Textsuche nichts findet, den Ort geokodieren
       und die nächstgelegenen Kinos nach Entfernung zeigen ---- */
let nearAnchor=null;   // {lat,lng,label} — aktiver Suchort
let nearError='';      // gesuchter Ort, der nicht gefunden wurde
let nearBusy=false;
const NEAR_MAX=60;
function distKm(aLat,aLng,bLat,bLng){
  const R=6371,toR=x=>x*Math.PI/180;
  const dLa=toR(bLat-aLat),dLo=toR(bLng-aLng);
  const s=Math.sin(dLa/2)**2+Math.cos(toR(aLat))*Math.cos(toR(bLat))*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.min(1,Math.sqrt(s)));
}
const fmtDist=km=> km<1?Math.round(km*1000)+' m' : km<10?km.toFixed(1)+' km' : Math.round(km)+' km';
async function geocodePlace(q){
  const url='https://geocoding-api.open-meteo.com/v1/search?count=1&language=de&format=json&name='+encodeURIComponent(q);
  const r=await fetch(url); if(!r.ok) throw new Error('HTTP '+r.status);
  const j=await r.json();
  if(!j.results||!j.results.length) return null;
  const g=j.results[0];
  return {lat:g.latitude,lng:g.longitude,label:[g.name,g.admin1,g.country].filter(Boolean).join(', ')};
}
async function searchNearest(q){
  q=(q||'').trim(); if(!q||nearBusy) return;
  nearBusy=true; nearError=''; setCountBusy('Suche Ort „'+q+'“ …');
  try{
    const geo=await geocodePlace(q);
    if(!geo){ nearAnchor=null; nearError=q; nearBusy=false; render(); return; }
    nearAnchor=geo; nearBusy=false; render();
    placeNearMarker(geo); fitNear();
  }catch(e){ nearAnchor=null; nearError=q; nearBusy=false; render(); }
}
function clearNear(){ nearAnchor=null; nearError=''; qEl.value=''; clearNearMarker(); render(); }
function setCountBusy(t){ const el=document.getElementById('count'); if(el)el.textContent=t; }
let nearMarker=null;
function clearNearMarker(){ if(nearMarker&&map){try{map.removeLayer(nearMarker);}catch(e){}} nearMarker=null; }
function placeNearMarker(a){
  if(!map)return; clearNearMarker();
  try{
    nearMarker=L.circleMarker([a.lat,a.lng],{renderer:dotRenderer,radius:9,weight:3,
      color:cv('--accent'),fillColor:cv('--accent'),fillOpacity:.22}).addTo(map);
    nearMarker.bindPopup('<div class="pp"><div class="nm">'+esc(a.label)+'</div><div class="mt">Suchort</div></div>');
  }catch(e){}
}
function fitNear(){
  if(!map||!nearAnchor)return;
  // direkt zur gesuchten Stadt fliegen (das ist explizit gewünscht)
  try{ map.flyTo([nearAnchor.lat,nearAnchor.lng], 12, {duration:.7}); }catch(e){}
}

/* ---- Filter ---- */
function baseFiltered(){
  const terms=norm(qEl.value).split(/\s+/).filter(Boolean);
  const allowed=new Set();
  curChips.forEach(c=>{if(active.has(c.key))c.cats.forEach(x=>allowed.add(x));});
  // Umkreis-Modus: Textsuche fand nichts, Ort ist geokodiert → nächste Kinos
  // (Format-/70mm-/kommerziell-Filter bleiben aktiv; Region/Land werden ignoriert,
  //  damit wirklich die nächstgelegenen Säle erscheinen — auch grenzübergreifend)
  if(nearAnchor){
    let arr=DATA.filter(d=>!isDeleted(d))
      .filter(d=>d.cats.some(c=>allowed.has(c)))
      .filter(d=>!f70.checked||d.film)
      .filter(d=>!fcom.checked||d.com);
    arr.forEach(d=>d._dist=distKm(nearAnchor.lat,nearAnchor.lng,d.lat,d.lng));
    arr.sort((a,b)=>a._dist-b._dist);
    return arr.slice(0,NEAR_MAX);
  }
  let arr=DATA.filter(d=>!isDeleted(d))
    .filter(d=>d.cats.some(c=>allowed.has(c)))
    .filter(d=>!regionEl.value||d.reg===regionEl.value)
    .filter(d=>!countryEl.value||d.co===countryEl.value)
    .filter(d=>!f70.checked||d.film)
    .filter(d=>!fcom.checked||d.com)
    .filter(d=>{if(!terms.length)return true;const h=norm([d.n,d.ci,d.st,d.co,d.reg].join(' '));return terms.every(t=>h.includes(t));});
  const k=sortEl.value;
  arr.sort((a,b)=>{
    let va,vb;
    if(k==='area'){va=area(b);vb=area(a);} // desc
    else if(k==='ar'){va=norm(FORMATS[a.cat].ar);vb=norm(FORMATS[b.cat].ar);}
    else {va=norm(a[k]);vb=norm(b[k]);}
    if(va<vb)return -1;if(va>vb)return 1;return norm(a.n)<norm(b.n)?-1:1;
  });
  return arr;
}
function inBounds(arr){
  if(nearAnchor)return arr;   // Umkreis: immer alle nächsten zeigen, nicht am Ausschnitt filtern
  if(!coupled||!map)return arr;
  const b=map.getBounds();
  return arr.filter(d=>b.contains([d.lat,d.lng]));
}
function hl(t,terms){let s=esc(t);terms.forEach(x=>{if(!x)return;s=s.replace(new RegExp('('+x.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');});return s;}

/* ---- Render ---- */
let lastBase=[];
function render(){ lastBase=baseFiltered(); drawMarkers(lastBase); renderList(); }
function rowHtml(d,terms,near,grouped){
  const id=d.id,n=photoCounts[id]||0;
  const badges=d.cats.map(c=>`<span><span class="sw" style="background:${catColor(c)}"></span>${FORMATS[c]?FORMATS[c].short:c}</span>`).join('');
  // im Stadt-gruppierten Umkreis-Modus steht die Stadt schon in der Überschrift
  const loc = grouped ? (d.st?esc(d.st):'') : `${hl(d.ci,terms)}${d.st?', '+esc(d.st):''} — ${hl(d.co,terms)}`;
  return `<div class="row" data-id="${esc(id)}" data-key="${esc(id)}">
      <div class="name">${hl(d.n,terms)}${d._edited?'<span class="edited" title="lokal bearbeitet">✎</span>':''}</div>
      ${loc?`<div class="loc">${loc}</div>`:''}
      <div class="meta">
        ${near&&d._dist!=null?`<span class="ndist">≈ ${fmtDist(d._dist)}</span>`:''}
        ${badges}
        ${d.film?'<span class="seventy">70 mm</span>':''}
        ${n?`<span>${n} Foto${n>1?'s':''}</span>`:''}
      </div>
    </div>`;
}
function renderList(){
  const base=lastBase;
  const vis=inBounds(base);
  const terms=norm(qEl.value).split(/\s+/).filter(Boolean);
  const near=!!nearAnchor, q=qEl.value.trim();
  if(!nearBusy) document.getElementById('count').textContent =
    near ? `Umgebung von „${nearAnchor.label}“ · ${vis.length} Kinos in ${new Set(vis.map(d=>d.ci+'|'+d.co)).size} Städten`
         : (coupled&&map? `${vis.length} im Kartenausschnitt · ` : '') + `${base.length} Treffer (von ${DATA.length})`;
  let html;
  if(near){
    // nach Stadt gruppieren, Städte nach Entfernung des nächsten Kinos sortiert
    const groups=new Map();
    vis.forEach(d=>{
      const key=d.ci+'|'+d.co;
      if(!groups.has(key)) groups.set(key,{ci:d.ci,co:d.co,dist:d._dist,items:[]});
      const g=groups.get(key); g.items.push(d); if(d._dist<g.dist)g.dist=d._dist;
    });
    const body=[...groups.values()].sort((a,b)=>a.dist-b.dist).map(g=>{
      const nn=g.items.length;
      const head=`<div class="citehead"><span class="cname">${esc(g.ci)}</span>`+
        `<span class="cmeta">${esc(g.co)} · ≈ ${fmtDist(g.dist)} · ${nn} Kino${nn>1?'s':''}</span></div>`;
      return head+g.items.map(d=>rowHtml(d,terms,near,true)).join('');
    }).join('');
    const note=`<div class="nearnote">Umgebung von <b>${esc(nearAnchor.label)}</b> — nach Entfernung sortiert.<button class="txtbtn" id="nearClear">zurücksetzen</button></div>`;
    html=note+body;
  }else if(vis.length){
    html=vis.map(d=>rowHtml(d,terms,near,false)).join('');
  }else if(nearError){
    html=`<div class="empty" style="padding:30px 22px">Ort „${esc(nearError)}“ nicht gefunden. Bitte Schreibweise prüfen.<button class="txtbtn" id="nearClear" style="display:block;margin-top:10px">zurücksetzen</button></div>`;
  }else if(q && base.length===0){
    html=`<div class="empty" style="padding:30px 22px">Keine direkten Treffer für „${esc(q)}“.<button class="addbtn" id="nearGo" style="display:block;margin-top:14px">Kinos in der Nähe zeigen</button></div>`;
  }else{
    html=`<div class="empty" style="padding:30px 22px">Keine Säle im aktuellen Ausschnitt. Karte herauszoomen oder „an Karte koppeln“ abschalten.</div>`;
  }
  rowsEl.innerHTML=html;
}

let map,cluster,markerById={},dataById={},dotRenderer=null;
DATA.forEach(d=>dataById[d.id]=d);
function initMap(){
  map=L.map('map',{worldCopyJump:true,zoomControl:true}).setView([25,5],2);
  map.createPane('dots');map.getPane('dots').style.zIndex=650;
  dotRenderer=L.svg({pane:'dots'});
  setTiles();
  cluster=L.markerClusterGroup({maxClusterRadius:48,chunkedLoading:true,showCoverageOnHover:false,
    disableClusteringAtZoom:16,spiderfyOnMaxZoom:true});
  map.addLayer(cluster);
  let t;map.on('moveend',()=>{if(coupled){clearTimeout(t);t=setTimeout(renderList,120);}});
  map.on('click',e=>{ if(!pickMode)return; pickMode=false;
    const la=e.latlng.lat.toFixed(5),ln=e.latlng.lng.toFixed(5);
    const eLat=document.getElementById('e_lat'),eLng=document.getElementById('e_lng');
    if(eLat&&eLng){eLat.value=la;eLng.value=ln;}
    const ph=document.getElementById('e_pickhint'); if(ph)ph.textContent='Standort gesetzt: '+la+', '+ln+' — jetzt „Speichern".';
  });
  drawMarkers(lastBase.length?lastBase:baseFiltered());
}
// Karte folgt dem Theme: Hell = OpenStreetMap, Dunkel = Voyager (invertiert -> farbig & dunkel)
const MAPSTYLES={
  light:{url:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', sub:'abc', max:19, attr:'OpenStreetMap'},
  dark: {url:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', sub:'abcd', max:20, attr:'OpenStreetMap, CARTO', filter:'invert(1) hue-rotate(180deg) brightness(.92) contrast(.95)'},
};
let tileLayer=null;
function setTiles(){
  const s = MAPSTYLES[document.documentElement.dataset.theme] || MAPSTYLES.light;
  if(tileLayer) map.removeLayer(tileLayer);
  tileLayer=L.tileLayer(s.url, {maxZoom:s.max, subdomains:s.sub, attribution:'&copy; '+s.attr}).addTo(map);
  map.getPane('tilePane').style.filter = s.filter || '';
}
function drawMarkers(arr){
  if(!map)return;
  cluster.clearLayers();markerById={};
  // Kinos auf identischen (nur stadtgenauen) Koordinaten leicht auffächern, damit sie
  // als einzelne, klickbare Kreise sichtbar werden statt exakt übereinander zu liegen.
  const groups={};
  arr.forEach(d=>{const k=d.lat.toFixed(5)+','+d.lng.toFixed(5);(groups[k]=groups[k]||[]).push(d);});
  const off={};
  Object.values(groups).forEach(g=>{ if(g.length<2)return;
    const R=0.00018; // ~20 m
    g.forEach((d,i)=>{const a=2*Math.PI*i/g.length;
      off[d.id]=[R*Math.cos(a), R*Math.sin(a)/Math.max(.2,Math.cos(d.lat*Math.PI/180))];});
  });
  const ms=arr.map(d=>{
    const id=d.id,n=photoCounts[id]||0;
    const o=off[id], lat=d.lat+(o?o[0]:0), lng=d.lng+(o?o[1]:0);
    const rad=d.cat==='film143'?12:(d.cat==='cinema'?10:11);
    const m=L.circleMarker([lat,lng],{renderer:dotRenderer,radius:rad,weight:2,color:cv('--paper'),fillColor:catColor(d.cat),fillOpacity:.95});
    m._key=id;m._base=rad;
    m.bindPopup(`<div class="pp"><div class="nm">${esc(d.n)}</div>
      <div class="mt">${esc(d.ci)}${d.st?', '+esc(d.st):''}, ${esc(d.co)}</div>
      <div class="mt">${d.cats.map(c=>FORMATS[c]?FORMATS[c].label:c).join(' · ')}${d.film?' · 70 mm':''}</div>
      <div class="mt">${dimText(d).main!=='—'?dimText(d).main+' m':''}${n?(dimText(d).main!=='—'?' · ':'')+n+' Foto'+(n>1?'s':''):''}</div></div>`);
    m.on('click',()=>openDetail(id));
    markerById[id]=m;
    return m;
  });
  cluster.addLayers(ms);
}
function highlightMarker(id,on){
  const m=markerById[id];if(!m)return;
  m.setStyle({radius:on?m._base+4:m._base,weight:on?2.6:1.8,color:on?cv('--accent'):cv('--paper')});
  if(on&&m._map)m.bringToFront();
}

  }).join('');
  dtin.innerHTML=`
    <div class="dt-kicker">${d.formats.length>1?d.formats.length+' Formate':esc(f.label)}${d.film?' · 70-mm-Film':''}${d._edited?' · lokal geändert (Vorschlag ausstehend)':(d._approved?' · korrigiert':'')}<button class="editlink" onclick="startEdit('${d.id}')">bearbeiten</button><button class="editlink" onclick="openReportForm('${d.id}')">melden</button></div>

    ${d.url?`<a class="dt-web" href="${esc(d.url)}" target="_blank" rel="noopener">Website des Kinos ↗</a>`:''}
    ${graphic}
    <div class="sectit">Formate &amp; Quellen</div>
    <table class="specs">${fmtRows}</table>
    <div class="sectit">Weiteres</div>
    <table class="specs">
      <tr><th>Kommerzielle Filme</th><td>${d.com?'ja':'nein'}</td></tr>
      <tr><th>Standort</th><td>${d.lat.toFixed(3)}, ${d.lng.toFixed(3)}${d.exact===false?' (genähert)':''}</td></tr>
    </table>
    ${(d.rce||d.pdf)?`<div class="sectit">Event & Vermietung</div>
      <div class="evbox">
        ${d.pdf?`<a class="evlink" href="${esc(d.pdf)}" target="_blank" rel="noopener">📄 Event-Datenblatt (PDF) — Säle, Leinwandmaße, Sitze ↗</a>`:''}
        ${d.rce?`<a class="evlink" href="${esc(d.rce)}" target="_blank" rel="noopener">Location-Details bei red-carpet-event.de ↗</a>`:''}
        ${hallsTable(d,imf)}
        ${d.pdf?`<button class="ghost" style="margin-top:6px" onclick="showPdf(this,'${esc(d.pdf)}')">Datenblatt hier ansehen</button>`:''}
        ${rcePhotoGrid(d)}
      </div>`:''}
    <div class="sectit">Eigene Fotos</div>
    <div class="pgrid" id="pgrid"></div>
    <label class="addbtn">Foto(s) hinzufügen<input type="file" id="pfile" accept="image/*" multiple hidden></label>
    <div class="hint">Lokal in diesem Browser gespeichert (IndexedDB) — kein Upload. Klick aufs Bild = groß, ✕ = löschen.</div>`;
  sidepanel.classList.add('open'); sidepanel.scrollTop=0;
  curId=id;fillPhotos();
  if(map && isFinite(d.lat)&&isFinite(d.lng)){ try{
    const ll=[d.lat,d.lng];

  document.getElementById('pfile').onchange=async e=>{

    if(dtin) dtin.innerHTML='<div class="dt-kicker" style="color:var(--accent)">Anzeige-Fehler</div><div class="hint">'+esc((err&&err.message)||String(err))+'</div>';

let curId=null,urls=[];

function saveOverride(d,patch){
  const o=OVERRIDES[d.id]||{};
  for(const k in patch){const v=patch[k]; if(v===''||v===null||(typeof v==='number'&&isNaN(v)))continue; o[k]=v;}
  OVERRIDES[d.id]=o; persistOverrides();
  Object.assign(d,o); d._edited=true; d.exact=true; render();
}
function hallsTable(d,imf){
  if(!d.halls || !d.halls.length) return '';
  const rows=d.halls.map(h=>{
    const isImax = /imax/i.test(h.name);
    return `<tr${isImax?' class="imaxrow"':''}><td>${esc(h.name)}</td><td>${h.seats}</td><td>${h.screen?esc(h.screen):'—'}</td></tr>`;
  }).join('');
  const hasScreens = d.halls.some(h=>h.screen);
  let hint='';
  if(hasScreens){
    hint = imf
      ? `Leinwandmaße hier = physische Fläche laut Event-Datenblatt (inkl. Rahmen/Maskierung) — weicht vom `+
        `projizierten ${esc(imf.ar||'IMAX')}-Bild oben ab (das ist die Betreiberangabe).`
      : `Leinwandmaße hier = physische Fläche laut Event-Datenblatt (inkl. Rahmen/Maskierung).`;
  }
  return `<table class="hallstbl">
    <thead><tr><th>Saal</th><th>Sitzplätze</th><th>Leinwand B×H</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr><td>Gesamt (${d.halls.length} Säle)</td><td>${d.hallSeats||''}</td><td></td></tr></tfoot>

/* ---- To-scale screen graphic ---- */
function screenGraphic(d){
  const W=420,H=210,padL=12,padR=12,padT=10,padB=26,ground=H-padB;
  const availW=W-padL-padR, availH=ground-padT;
  const human=1.8;
  if(d.cat==='dome'&&d.w){
    const dia=d.w, sc=Math.min(availW/dia, (availH)/(dia/2));
    const r=dia*sc/2, cx=W/2, cy=ground;
    const hh=human*sc, hw=Math.max(hh*0.22,3), hx=cx-r+4;
    return `<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg" style="display:block">
      <line x1="${padL}" y1="${ground}" x2="${W-padR}" y2="${ground}" stroke="${cv('--line2')}"/>
      <path d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy} Z" fill="${catColor(d.cat)}" fill-opacity=".22" stroke="${catColor(d.cat)}" stroke-width="1.5"/>
      ${humanPath(hx,ground,hh,hw)}
      <text x="${cx}" y="${ground+17}" text-anchor="middle" font-family="${cv('--mono')}" font-size="11" fill="${cv('--ink2')}">Ø ${dia} m</text>
    </svg>`;
  }
  const w=d.w,h=d.h;
  if(!w||!h){
    return `<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg" style="display:block">
      <rect x="${padL}" y="${padT}" width="${availW}" height="${availH}" fill="none" stroke="${cv('--line2')}" stroke-dasharray="4 4"/>
      <text x="${W/2}" y="${H/2}" text-anchor="middle" font-family="${cv('--mono')}" font-size="12" fill="${cv('--ink2')}">keine Maßangabe</text></svg>`;
  }
  const sc=Math.min(availW/w, availH/Math.max(h,human));
  const sw=w*sc, sh=h*sc, sx=padL, sy=ground-sh;
  const hh=human*sc, hw=Math.max(hh*0.22,3), hx=sx+sw+10;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg" style="display:block">
    <line x1="${padL}" y1="${ground}" x2="${W-padR}" y2="${ground}" stroke="${cv('--line2')}"/>
    <rect x="${sx}" y="${sy}" width="${sw}" height="${sh}" fill="${catColor(d.cat)}" fill-opacity=".18" stroke="${catColor(d.cat)}" stroke-width="1.5"/>
    ${humanPath(hx,ground,hh,hw)}
    <text x="${sx+sw/2}" y="${ground+17}" text-anchor="middle" font-family="${cv('--mono')}" font-size="11" fill="${cv('--ink2')}">${w} m</text>
    <text x="${sx-4}" y="${sy+sh/2}" text-anchor="end" dominant-baseline="middle" font-family="${cv('--mono')}" font-size="11" fill="${cv('--ink2')}" transform="rotate(-90 ${sx-4} ${sy+sh/2})">${h} m</text>
  </svg>`;
}
function humanPath(x,ground,hh,hw){
  const headR=Math.max(hh*0.08,1.6), bodyTop=ground-hh+headR*2;
  return `<g fill="${cv('--ink2')}">
    <circle cx="${x}" cy="${ground-hh+headR}" r="${headR}"/>
    <rect x="${x-hw/2}" y="${bodyTop}" width="${hw}" height="${ground-bodyTop}" rx="${hw/2}"/>
  </g>`;
}

/* ---- Theme ---- */
const themeBtn=document.getElementById('themeBtn');
function applyTheme(t){
  document.documentElement.dataset.theme=t;
  themeBtn.textContent = t==='dark'?'Hell':'Dunkel';
  localStorage.setItem('imaxTheme',t);
  // refresh swatch colors + markers
  document.querySelectorAll('.facet').forEach(b=>{b.querySelector('.sw').style.background=catColor(b.dataset.k);});
  if(map){setTiles();drawMarkers(lastBase.length?lastBase:baseFiltered());}
}
themeBtn.onclick=()=>applyTheme(document.documentElement.dataset.theme==='dark'?'light':'dark');
applyTheme(localStorage.getItem('imaxTheme')||'light');

/* ---- Legacy toggle button (hidden on mobile; kept as a reference used by startEdit) ---- */
const viewBtn=document.getElementById('viewBtn');
viewBtn.onclick=()=>{document.body.classList.toggle('showmap');if(map)setTimeout(()=>map.invalidateSize(),50);};

/* ---- Seitenleiste per Ziehgriff anpassen ---- */
(function initResizer(){
  const listpane=document.getElementById('listpane'), resizer=document.getElementById('resizer');
  if(!listpane||!resizer) return;
  const MIN=280, MAX=650;
  const saved=parseInt(localStorage.getItem('listpaneWidth'),10);
  if(saved && saved>=MIN && saved<=MAX){ listpane.style.width=saved+'px'; listpane.style.maxWidth='none'; }
  let dragging=false, raf=null;
  function apply(x){
    const rect=listpane.parentElement.getBoundingClientRect();
    let w=Math.round(x-rect.left);
    w=Math.max(MIN,Math.min(MAX,w));
    listpane.style.width=w+'px'; listpane.style.maxWidth='none';
    if(map){ if(raf)cancelAnimationFrame(raf); raf=requestAnimationFrame(()=>map.invalidateSize()); }
  }
  resizer.addEventListener('pointerdown',e=>{
    if(innerWidth<=820) return; // mobil: kein Resize
    dragging=true; resizer.classList.add('dragging'); resizer.setPointerCapture(e.pointerId);
    document.body.style.userSelect='none';
  });
  resizer.addEventListener('pointermove',e=>{ if(dragging) apply(e.clientX); });
  function stop(){
    if(!dragging) return;
    dragging=false; resizer.classList.remove('dragging'); document.body.style.userSelect='';
    localStorage.setItem('listpaneWidth', parseInt(listpane.style.width,10));
    if(map) setTimeout(()=>map.invalidateSize(),50);
  }
  resizer.addEventListener('pointerup',stop);
  resizer.addEventListener('pointercancel',stop);
})();

/* ---- Boot ---- */
(async function boot(){
  await loadSharedCorrections();
  initMap();
  setScope('premium');
  openDB().then(async()=>{photoCounts=await countAll();render();if(map)drawMarkers(lastBase);}).catch(()=>{});
})();

/* =====================================================================
   Mobile-first shell: full-screen map + draggable list sheet + filter
   sheet. The real controls are *relocated* into these shells (nodes are
   moved, not cloned) so every existing handler keeps working. Nothing
   here runs on desktop; on resize the nodes are returned to their homes.
   ===================================================================== */
(function mobileShell(){
  const mq=matchMedia('(max-width:820px)');
  const home=new Map();
  const stash=n=>{ if(n && !home.has(n)) home.set(n,{p:n.parentNode,s:n.nextSibling}); };
  const moveTo=(c,n)=>{ if(c&&n){ stash(n); c.appendChild(n); } };
  const $=s=>document.querySelector(s), byId=id=>document.getElementById(id);

  let built=false, active=false, els={};
  function build(){
    if(built) return; built=true;
    const mk=(id,html)=>{ const d=document.createElement('div'); d.id=id; if(html)d.innerHTML=html; return d; };
    const chrome=mk('mchrome',
      `<div id="mtop"><label id="msearch"></label>`+
      `<button id="mfilterbtn" type="button"><span>Filter</span><span class="fdot"></span></button></div>`+
      `<div id="mmode"></div>`);
    const sheet=mk('msheet',`<div id="mhandle"><div class="grip"></div></div><div id="msheetbody"></div>`);
    const filter=mk('mfilter',
      `<div id="mfilterhead"><span class="brand">Cinema&middot;Atlas</span>`+
      `<button id="mfilterdone" type="button">Fertig</button></div><div id="mfilterbody"></div>`);
    document.body.append(chrome,sheet,filter);
    els={chrome,sheet,filter,
      msearch:chrome.querySelector('#msearch'), mmode:chrome.querySelector('#mmode'),
      fbtn:chrome.querySelector('#mfilterbtn'), body:sheet.querySelector('#msheetbody'),
      handle:sheet.querySelector('#mhandle'), fbody:filter.querySelector('#mfilterbody'),
      fdone:filter.querySelector('#mfilterdone')};
    els.fbtn.onclick=()=>{ filter.classList.add('open'); };
    els.fdone.onclick=()=>{ filter.classList.remove('open'); updateFilterBtn(); };
    filter.addEventListener('click',updateFilterBtn);
    filter.addEventListener('change',updateFilterBtn);
    initDrag(sheet, els.handle);
  }

  function sec(title){
    const s=document.createElement('div'); s.className='msec';
    const l=document.createElement('div'); l.className='mlabel'; l.textContent=title;
    s.appendChild(l); return s;
  }
  function updateFilterBtn(){
    if(!active||!els.fbtn) return;
    const off=document.querySelectorAll('#facets .facet.off').length>0;
    const changed = byId('region').value || byId('country').value ||
      byId('film70').checked || byId('commercial').checked || off;
    els.fbtn.classList.toggle('on', !!changed);
  }

  function enter(){
    build(); active=true; document.body.classList.add('mobileui');
    // top bar
    moveTo(els.msearch, byId('q'));
    moveTo(els.mmode, $('.modesw'));
    // list sheet
    moveTo(els.body, byId('listpane'));
    // filter sheet content
    const fb=els.fbody; fb.innerHTML='';
    const sRegion=sec('Region & Land');
    moveTo(sRegion, byId('region').closest('.ctl'));
    moveTo(sRegion, byId('country').closest('.ctl'));
    const sFormats=sec('Formate');
    moveTo(sFormats, byId('facets'));
    const txt=document.createElement('div'); txt.id='mtxtrow';
    moveTo(txt, byId('allOn')); moveTo(txt, byId('allOff')); moveTo(txt, byId('detailWrap'));
    sFormats.appendChild(txt);
    const sOpts=sec('Optionen');
    moveTo(sOpts, byId('film70').closest('label'));
    moveTo(sOpts, byId('commercial').closest('label'));
    moveTo(sOpts, byId('coupled').closest('label'));
    const sMore=sec('Mehr');
    const acts=document.createElement('div'); acts.id='mactions';
    moveTo(acts, $('header a[href="anleitung.html"]'));
    moveTo(acts, byId('reportBtn')); moveTo(acts, byId('exportBtn')); moveTo(acts, byId('themeBtn'));
    sMore.appendChild(acts);
    fb.append(sRegion,sFormats,sOpts,sMore);

    setSheet(Math.round(innerHeight*0.46));
    updateFilterBtn();
    kickMap();
  }
  function exit(){
    active=false; document.body.classList.remove('mobileui');
    if(els.filter) els.filter.classList.remove('open');
    // return every relocated node to its original position
    home.forEach(({p,s},n)=>{ if(p){ p.insertBefore(n, (s&&s.parentNode===p)?s:null); } });
    home.clear();
    kickMap();
  }

  /* draggable bottom sheet: snap between peek / half / full */
  function setSheet(px){
    const H=innerHeight, min=Math.round(H*0.14), max=Math.round(H*0.92);
    const h=Math.max(min,Math.min(max,px));
    els.sheet.style.setProperty('--sheet-h', h+'px');
    return h;
  }
  function snap(px){
    const H=innerHeight, pts=[0.16,0.5,0.9].map(f=>f*H);
    const t=pts.reduce((a,b)=>Math.abs(b-px)<Math.abs(a-px)?b:a);
    setSheet(Math.round(t));
  }
  function initDrag(sheet,handle){
    let dragging=false, startY=0, startH=0;
    handle.addEventListener('pointerdown',e=>{
      dragging=true; startY=e.clientY; startH=sheet.getBoundingClientRect().height;
      sheet.classList.add('dragging'); handle.setPointerCapture(e.pointerId);
    });
    handle.addEventListener('pointermove',e=>{
      if(!dragging) return; setSheet(startH + (startY-e.clientY));
    });
    const end=e=>{
      if(!dragging) return; dragging=false; sheet.classList.remove('dragging');
      snap(sheet.getBoundingClientRect().height); setTimeout(kickMap,320);
    };
    handle.addEventListener('pointerup',end);
    handle.addEventListener('pointercancel',end);
  }

  let kickT=null;
  function kickMap(){ // Leaflet needs a size refresh after the layout flips
    clearTimeout(kickT);
    kickT=setTimeout(()=>{ try{ if(typeof map!=='undefined'&&map) map.invalidateSize(); }catch(e){} }, 260);
  }

  function sync(){ mq.matches ? (active||enter()) : (active&&exit()); }
  mq.addEventListener ? mq.addEventListener('change',sync) : mq.addListener(sync);
  addEventListener('orientationchange',()=>active&&setTimeout(()=>{setSheet(Math.round(innerHeight*0.46));kickMap();},250));
  sync();
})();
</script>
